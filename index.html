<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradWay 2.0</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ==========================
           GradWay 2.0
           Style Part 1
        ========================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #222;
            transition: .3s;
        }

        body.dark {
            background: #111827;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,.08);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s;
        }

        body.dark header {
            background: #1f2937;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 35px;
            color: #4F46E5;
        }

        .logo h1 {
            font-size: 30px;
            font-weight: 700;
        }

        .header-menu button {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            background: #eef2ff;
            color: #4F46E5;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.dark .header-menu button {
            background: #374151;
            color: #fbbf24;
        }

        .header-menu button:hover {
            transform: scale(1.08);
        }

        .profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #4F46E5;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .profile-left h2 {
            font-size: 30px;
        }

        .profile-left p {
            color: #777;
        }
        
        body.dark .profile-left p {
            color: #aaa;
        }

        .profile-right {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,.08);
            min-width: 180px;
            text-align: center;
            transition: .35s;
        }

        .card h3 {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
        }

        .card h1 {
            font-size: 38px;
            color: #4F46E5;
        }

        body.dark .card {
            background: #1f2937;
        }
        body.dark .card h3 {
            color: #aaa;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 40px 40px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,.08);
            transition: .35s;
        }

        body.dark .box {
            background: #1f2937;
        }

        .box h3 {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
        }
        body.dark .box h3 {
            color: #aaa;
        }

        .box h2 {
            font-size: 30px;
            font-weight: 700;
        }

        .chart {
            margin: 0 40px 40px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,.08);
            transition: .35s;
        }

        body.dark .chart {
            background: #1f2937;
        }

        .chart h2 {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        .course {
            margin: 0 40px 40px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,.08);
            transition: .35s;
            overflow-x: auto;
        }

        body.dark .course {
            background: #1f2937;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .course-header button {
            padding: 12px 18px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            transition: .3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .course-header button:hover {
            transform: translateY(-2px);
            background: #4338ca;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead {
            background: #eef2ff;
        }
        body.dark th {
            background: #374151;
            color: #d1d5db;
        }

        th {
            padding: 16px;
            text-align: left;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        body.dark td {
            border-color: #374151;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        body.dark tbody tr:hover {
            background: #374151;
        }

        .modal {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(4px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 500px;
            max-width: 95%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            animation: popup .25s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        body.dark .modal-content {
            background: #1f2937;
        }

        @keyframes popup {
            from { transform: scale(.8) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: .3s;
            background: white;
        }

        .modal-content input:focus,
        .modal-content select:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        body.dark .modal-content input,
        body.dark .modal-content select {
            background: #374151;
            border: 1px solid #4b5563;
            color: white;
        }
        body.dark .modal-content input:focus,
        body.dark .modal-content select:focus {
            border-color: #6366f1;
        }

        .modal-btn {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        #saveBtn {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        #saveBtn:hover { background: #4338ca; }

        #closeBtn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        #closeBtn:hover { background: #dc2626; }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s;
            font-size: 13px;
        }

        .delete-btn:hover { background: #dc2626; }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            min-width: 40px;
        }

        .badge-a { background: #dcfce7; color: #166534; }
        .badge-b { background: #dbeafe; color: #1e40af; }
        .badge-c { background: #fef3c7; color: #92400e; }
        .badge-f { background: #fee2e2; color: #991b1b; }

        /* Status Colors */
        .status-normal { color: #22c55e; }
        .status-warning { color: #f59e0b; }
        .status-danger { color: #ef4444; }

        footer {
            padding: 40px;
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }

        body.dark footer { color: #aaa; }

        /* Responsive */
        @media (max-width: 992px) {
            .profile { flex-direction: column; align-items: flex-start; }
            .profile-right { width: 100%; justify-content: space-between; }
            .card { flex: 1; }
            .dashboard { padding: 0 20px 20px; }
            .chart, .course { margin: 0 20px 20px; }
        }

        @media (max-width: 768px) {
            .logo h1 { font-size: 24px; }
            .profile-left h2 { font-size: 24px; }
            .card h1 { font-size: 28px; }
            .course-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .course-header button { width: 100%; justify-content: center; }
            .chart-container { height: 250px; }
        }
        
        @media (max-width: 500px) {
            .avatar { width: 70px; height: 70px; font-size: 30px; }
            .profile { padding: 20px; }
            .card, .box { padding: 18px; }
            .chart, .course { padding: 20px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #4F46E5; border-radius: 20px; }
        ::-webkit-scrollbar-track { background: transparent; }

        .fade-up { animation: fadeUp .5s ease; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover, .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,.15);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <h1>GradWay</h1>
        </div>
        <div class="header-menu">
            <button id="themeBtn" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <section class="profile fade-up">
        <div class="profile-left">
            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <div>
                <h2 id="studentName">นักศึกษา</h2>
                <p id="studentID">6600000000</p>
            </div>
        </div>

        <div class="profile-right">
            <div class="card">
                <h3>GPAX</h3>
                <h1 id="gpax">0.00</h1>
            </div>
            <div class="card">
                <h3>หน่วยกิตสะสม</h3>
                <h1 id="credit">0</h1>
            </div>
        </div>
    </section>

    <section class="dashboard fade-up" style="animation-delay: 0.1s;">
        <div class="box">
            <h3>สถานภาพ</h3>
            <h2 id="status" class="status-normal">ปกติ</h2>
        </div>
        <div class="box">
            <h3>การคาดการณ์เกียรตินิยม</h3>
            <h2 id="honor">-</h2>
        </div>
        <div class="box">
            <h3>ความคืบหน้า (133 หน่วยกิต)</h3>
            <h2 id="progress">0%</h2>
        </div>
    </section>

    <section class="chart fade-up" style="animation-delay: 0.2s;">
        <h2>
            <i class="fa-solid fa-chart-line text-primary" style="color: #4F46E5;"></i>
            แนวโน้มผลการเรียน
        </h2>
        <div class="chart-container">
            <canvas id="gpaChart"></canvas>
        </div>
    </section>

    <section class="course fade-up" style="animation-delay: 0.3s;">
        <div class="course-header">
            <h2>
                <i class="fa-solid fa-book" style="color: #4F46E5; margin-right: 10px;"></i>รายวิชาที่เรียนแล้ว
            </h2>
            <button id="addBtn">
                <i class="fa-solid fa-plus"></i> เพิ่มรายวิชา
            </button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>รหัสวิชา</th>
                    <th>ชื่อวิชา</th>
                    <th style="text-align: center;">หน่วยกิต</th>
                    <th style="text-align: center;">เกรด</th>
                    <th style="text-align: right;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="courseTable">
                <!-- Courses injected via JS -->
            </tbody>
        </table>
    </section>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2><i class="fa-solid fa-plus" style="color: #4F46E5; margin-right: 10px;"></i>เพิ่มรายวิชา</h2>
            <form id="courseForm">
                <input id="code" placeholder="รหัสวิชา (เช่น CS101)" required autocomplete="off">
                <input id="name" placeholder="ชื่อวิชา" required autocomplete="off">
                <input id="creditInput" type="number" placeholder="หน่วยกิต (เช่น 3)" min="1" max="10" required>
                
                <select id="grade" required>
                    <option value="" disabled selected>เลือกเกรดที่ได้</option>
                    <option value="A">A</option>
                    <option value="B+">B+</option>
                    <option value="B">B</option>
                    <option value="C+">C+</option>
                    <option value="C">C</option>
                    <option value="D+">D+</option>
                    <option value="D">D</option>
                    <option value="F">F</option>
                </select>

                <div class="modal-btn">
                    <button type="button" id="closeBtn">ยกเลิก</button>
                    <button type="submit" id="saveBtn">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        GradWay 2.0 &copy; 2026 - Minimal Grade Tracking App
    </footer>

    <script>
        /* ===========================================
           GradWay 2.0
           script.js - Logic & Core Functionality
        =========================================== */

        // Constants
        const gradePoint = {
            "A": 4.0, "B+": 3.5, "B": 3.0, "C+": 2.5,
            "C": 2.0, "D+": 1.5, "D": 1.0, "F": 0.0
        };
        const TOTAL_CREDITS_REQUIRED = 133;

        // State
        let courses = JSON.parse(localStorage.getItem("courses")) || [];
        let isDarkMode = localStorage.getItem("darkMode") === "true";
        let gpaChartInstance = null;

        // DOM Elements
        const table = document.getElementById("courseTable");
        const gpaxText = document.getElementById("gpax");
        const creditText = document.getElementById("credit");
        const progressText = document.getElementById("progress");
        const statusText = document.getElementById("status");
        const honorText = document.getElementById("honor");
        
        const modal = document.getElementById("modal");
        const courseForm = document.getElementById("courseForm");
        const addBtn = document.getElementById("addBtn");
        const closeBtn = document.getElementById("closeBtn");
        const themeBtn = document.getElementById("themeBtn");

        // Initial setup on load
        function init() {
            if (isDarkMode) {
                document.body.classList.add("dark");
                themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
            updateUI();
        }

        // Calculate and Update Dashboard Data
        function updateUI() {
            let totalCredits = 0;   // All credits enrolled
            let earnedCredits = 0;  // Credits passed (Not F)
            let totalPoints = 0;
            let hasF = false;

            // Prepare array for chart (Cumulative GPA over time)
            let cumulativeData = [];
            let runCredit = 0;
            let runPoint = 0;

            courses.forEach((c, index) => {
                let cr = parseFloat(c.credit);
                let gp = gradePoint[c.grade];
                
                totalCredits += cr;
                totalPoints += (cr * gp);
                
                if(c.grade !== 'F') earnedCredits += cr;
                if(c.grade === 'F') hasF = true;

                // For chart
                runCredit += cr;
                runPoint += (cr * gp);
                cumulativeData.push({
                    x: `วิชาที่ ${index + 1}`,
                    y: (runPoint / runCredit).toFixed(2)
                });
            });

            // Calculate GPAX
            let gpax = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : "0.00";
            gpaxText.innerText = gpax;
            creditText.innerText = earnedCredits;

            // Progress
            let progressPercent = Math.min(100, Math.round((earnedCredits / TOTAL_CREDITS_REQUIRED) * 100));
            progressText.innerText = `${progressPercent}%`;

            // Status Logic
            if (totalCredits === 0) {
                statusText.innerText = "ปกติ";
                statusText.className = "status-normal";
            } else if (parseFloat(gpax) < 1.50 && totalCredits >= 15) { // Assuming freshies get a grace period
                statusText.innerText = "พ้นสภาพ (Retire)";
                statusText.className = "status-danger";
            } else if (parseFloat(gpax) < 2.00) {
                statusText.innerText = "วิทยาทัณฑ์ (Probation)";
                statusText.className = "status-warning";
            } else {
                statusText.innerText = "ปกติ";
                statusText.className = "status-normal";
            }

            // Honor Prediction Logic
            if (hasF || cumulativeData.length === 0) {
                honorText.innerText = hasF ? "หมดสิทธิ์ (ติด F)" : "-";
                honorText.style.color = hasF ? "#ef4444" : "inherit";
            } else if (parseFloat(gpax) >= 3.60) { // Example 1st Class criteria
                honorText.innerText = "เกียรตินิยมอันดับ 1";
                honorText.style.color = "#f59e0b"; // Warning color (Amber)
            } else if (parseFloat(gpax) >= 3.25) { // Example 2nd Class criteria
                honorText.innerText = "เกียรตินิยมอันดับ 2";
                honorText.style.color = "#4F46E5"; // Primary color (Indigo)
            } else {
                honorText.innerText = "ไม่มี";
                honorText.style.color = "inherit";
            }

            renderTable();
            updateChart(cumulativeData);
        }

        function getBadgeClass(grade) {
            if(['A', 'B+'].includes(grade)) return 'badge-a';
            if(['B', 'C+'].includes(grade)) return 'badge-b';
            if(['C', 'D+'].includes(grade)) return 'badge-c';
            return 'badge-f'; // D or F
        }

        function renderTable() {
            table.innerHTML = "";
            if(courses.length === 0) {
                table.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #888;">ยังไม่มีข้อมูลรายวิชา</td></tr>`;
                return;
            }

            courses.forEach((c, index) => {
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><b>${c.code}</b></td>
                    <td>${c.name}</td>
                    <td style="text-align: center;">${c.credit}</td>
                    <td style="text-align: center;"><span class="badge ${getBadgeClass(c.grade)}">${c.grade}</span></td>
                    <td style="text-align: right;">
                        <button class="delete-btn" onclick="deleteCourse(${index})" title="ลบรายวิชา">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;
                table.appendChild(tr);
            });
        }

        // Chart.js Setup
        function updateChart(data) {
            const ctx = document.getElementById('gpaChart').getContext('2d');
            
            // Text color based on theme
            const textColor = document.body.classList.contains('dark') ? '#9ca3af' : '#6b7280';
            const gridColor = document.body.classList.contains('dark') ? '#374151' : '#e5e7eb';

            if (gpaChartInstance) {
                gpaChartInstance.destroy();
            }

            const labels = data.map(d => d.x);
            const values = data.map(d => d.y);

            gpaChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'GPA สะสม',
                        data: values,
                        borderColor: '#4F46E5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#4F46E5',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3 // smooth curve
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 4.0,
                            grid: { color: gridColor },
                            ticks: { color: textColor }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: textColor }
                        }
                    }
                }
            });
        }

        // Add & Save Course
        courseForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newCourse = {
                code: document.getElementById('code').value.toUpperCase(),
                name: document.getElementById('name').value,
                credit: parseFloat(document.getElementById('creditInput').value),
                grade: document.getElementById('grade').value
            };

            courses.push(newCourse);
            localStorage.setItem("courses", JSON.stringify(courses));
            
            closeModal();
            updateUI();
        });

        // Delete Course (Globally accessible via inline onclick)
        window.deleteCourse = function(index) {
            courses.splice(index, 1);
            localStorage.setItem("courses", JSON.stringify(courses));
            updateUI();
        };

        // Theme Toggle
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            isDarkMode = document.body.classList.contains('dark');
            localStorage.setItem("darkMode", isDarkMode);
            
            themeBtn.innerHTML = isDarkMode 
                ? '<i class="fa-solid fa-sun"></i>' 
                : '<i class="fa-solid fa-moon"></i>';
                
            updateUI(); // Re-render chart to update grid colors
        });

        // Modal Handlers
        addBtn.addEventListener('click', () => {
            courseForm.reset();
            modal.classList.add('show');
        });

        function closeModal() {
            modal.classList.remove('show');
        }

        closeBtn.addEventListener('click', closeModal);

        // Close modal when clicking outside
        modal.addEventListener('click', (e) => {
            if(e.target === modal) {
                closeModal();
            }
        });

        // Run
        init();
    </script>
</body>
</html>
